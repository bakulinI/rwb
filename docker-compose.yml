services:
  nats:
    image: nats:2.11-alpine
    ports:
      - "4222:4222"

  app:
    build: .
    depends_on:
      - nats
    environment:
      HTTP_ADDR: ":8080"
      NATS_URL: "nats://nats:4222"
      NATS_SUBJECT: "search.queries"
      STOP_WORDS: "casino,spam"
      MAX_PER_SOURCE_IN_WINDOW: "5"
    ports:
      - "8080:8080"

  nats-box:
    image: natsio/nats-box:0.16.0
    depends_on:
      - nats
    profiles:
      - tools
